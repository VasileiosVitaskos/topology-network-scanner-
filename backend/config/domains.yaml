# ══════════════════════════════════════════════════════════════
# Domain Presets — Physics-Informed Detection Parameters
# ══════════════════════════════════════════════════════════════
#
# Each domain tunes the engine for a specific OT environment:
#
#   alpha  = Pearson correlation weight  (instantaneous coupling)
#   beta   = DTW distance weight         (time-lagged similarity)
#   gamma  = Granger causality weight    (causal direction)
#
#   window_sec  = sliding window duration in seconds
#   step_sec    = step between windows (overlap = window - step)
#   max_sensors = subsample to this many sensors (performance cap)
#
# The weights reflect the dominant physics:
#   - Water treatment: slow fluid dynamics → DTW dominates (beta=0.6)
#   - Power grid: instantaneous AC → Pearson dominates (alpha=0.6)
#   - Manufacturing: causal chains → Granger dominates (gamma=0.5)
# ══════════════════════════════════════════════════════════════

domains:
  water_treatment:
    description: "Slow fluid dynamics (SWaT, BATADAL)"
    alpha: 0.2
    beta: 0.6
    gamma: 0.2
    window_sec: 60
    step_sec: 10
    max_sensors: 30
    dominant_physics: "slow_fluid_dynamics"
    datasets: ["swat", "batadal"]

  power_grid:
    description: "Instantaneous AC coupling"
    alpha: 0.6
    beta: 0.2
    gamma: 0.2
    window_sec: 1
    step_sec: 0.2
    max_sensors: 50
    dominant_physics: "instantaneous_ac"
    datasets: []

  manufacturing:
    description: "Causal process chains (HAI)"
    alpha: 0.2
    beta: 0.3
    gamma: 0.5
    window_sec: 10
    step_sec: 2
    max_sensors: 30
    dominant_physics: "causal_process_chains"
    datasets: ["hai"]

  gas_pipeline:
    description: "Pressure wave propagation"
    alpha: 0.2
    beta: 0.6
    gamma: 0.2
    window_sec: 30
    step_sec: 5
    max_sensors: 40
    dominant_physics: "pressure_wave"
    datasets: ["gas_pipeline"]

  it_network:
    description: "Mixed IT traffic (CICIDS2017)"
    alpha: 0.4
    beta: 0.4
    gamma: 0.2
    window_sec: 30
    step_sec: 5
    max_sensors: 500
    dominant_physics: "mixed"
    datasets: ["cicids"]


# ── Detection Thresholds ─────────────────────────────────────

anomaly_scan:
  h2_alert_threshold: 1        # β₂ ≥ 1 triggers Gate 3
  h1_warning_sigma: 3.0        # β₁ z-score for warning
  h0_info_sigma: 2.0           # β₀ z-score for info
  min_consecutive_windows: 3   # MID→HIGH escalation threshold
  buffer_short_sec: 60
  buffer_medium_sec: 3600
  buffer_long_sec: 86400


# ── Filtration Parameters ────────────────────────────────────

filtration:
  lambda: 0.5                  # Blend: λ·ε_domain + (1-λ)·ε_local
  knn_k: 5                     # k for kNN distance scale
  knn_gamma_scale: 1.75        # Multiplier on median kNN distance


# ── EMA Decay ────────────────────────────────────────────────

matrix:
  decay_factor: 0.95           # Fast layer: ~2 min half-life
  novelty_memory_sec: 3600


# ── Reconnaissance Pre-Filter ────────────────────────────────

deny_filter:
  k_recon: 10                  # DENY events to flag as recon
  t_recon_sec: 60              # Time window for recon detection
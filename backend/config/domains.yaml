domains:
  water_treatment:
    description: "Slow fluid dynamics (SWaT, BATADAL)"
    alpha: 0.2
    beta: 0.6
    gamma: 0.2
    window_sec: 60
    step_sec: 10
    max_sensors: 86
    dominant_physics: "slow_fluid_dynamics"
    datasets: ["swat", "batadal"]
  power_grid:
    description: "Instantaneous AC coupling"
    alpha: 0.6
    beta: 0.2
    gamma: 0.2
    window_sec: 1
    step_sec: 0.2
    max_sensors: 50
    dominant_physics: "instantaneous_ac"
    datasets: []
  manufacturing:
    description: "Causal process chains (HAI)"
    alpha: 0.2
    beta: 0.3
    gamma: 0.5
    window_sec: 10
    step_sec: 2
    max_sensors: 86
    dominant_physics: "causal_process_chains"
    datasets: ["hai"]
  gas_pipeline:
    description: "Pressure wave propagation"
    alpha: 0.2
    beta: 0.6
    gamma: 0.2
    window_sec: 30
    step_sec: 5
    max_sensors: 40
    dominant_physics: "pressure_wave"
    datasets: ["gas_pipeline"]
  it_network:
    description: "Mixed IT traffic (CICIDS2017)"
    alpha: 0.4
    beta: 0.4
    gamma: 0.2
    window_sec: 30
    step_sec: 5
    max_sensors: 500
    dominant_physics: "mixed"
    datasets: ["cicids"]

anomaly_scan:
  h2_alert_threshold: 1
  h1_warning_sigma: 3.0
  h0_info_sigma: 2.0
  min_consecutive_windows: 3
  buffer_short_sec: 60
  buffer_medium_sec: 3600
  buffer_long_sec: 86400

filtration:
  lambda: 0.5
  knn_k: 5
  knn_gamma_scale: 1.75

matrix:
  decay_factor: 0.95
  novelty_memory_sec: 3600

deny_filter:
  k_recon: 10
  t_recon_sec: 60
